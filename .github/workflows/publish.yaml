name: Publish to npm

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Get commit message
        id: msg
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          fi

      - name: Skip if docs-only
        id: skip
        run: |
          MSG="${{ steps.msg.outputs.value }}"
          if echo "$MSG" | grep -qiE "^docs(\(.+\))?:|^\[skip ci\]|^chore: bump version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version bump
        id: bump
        if: steps.skip.outputs.skip == 'false'
        run: |
          MSG="${{ steps.msg.outputs.value }}"
          if echo "$MSG" | grep -qiE "BREAKING CHANGE|!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE "^feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.skip.outputs.skip == 'false'
        run: npm install

      - name: Bump version
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          git add package.json
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git tag "v$VERSION"
          git push
          git push --tags

      - name: Publish to npm
        if: steps.skip.outputs.skip == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
